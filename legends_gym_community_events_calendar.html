const tabLabels = [
  {key:"event", label:"📅 Event"},
  {key:"ig", label:"📸 Instagram"},
  {key:"fb", label:"👥 Facebook"},
  {key:"email", label:"✉️ Email"},
  {key:"blog", label:"📝 Blog"}
];

function esc(str) {
  return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
}

function renderMonth(idx) {
  const m = months[idx];
  const tabsHtml = tabLabels.map((t,i) =>
    `<button class="tab${i===0?' active':''}" onclick="switchTab(${idx},${i},'${t.key}')">${t.label}</button>`
  ).join('');

  const eventHtml = `
    <div class="tab-content active" id="tc-${idx}-event">
      <div class="event-box">
        <div class="event-name">${m.event.name}</div>
        <div class="event-date">📅 ${m.event.date}</div>
        <div class="event-desc">${m.event.desc}</div>
        <ul class="event-bullets">${m.event.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
      </div>
    </div>`;

  const igText = m.ig.caption;
  const igHtml = `
    <div class="tab-content" id="tc-${idx}-ig">
      <div class="post-box">
        <div class="platform-label ig-label">📸 Instagram Caption + Visual Direction</div>
        <div class="post-text" id="ig-text-${idx}">${igText.replace(/</g,'&lt;')}</div>
        <div class="visual-hint">Visual: ${m.ig.visual}</div>
        <button class="copy-btn" onclick="copyById('ig-text-${idx}',this)">⧉ Copy Caption</button>
      </div>
    </div>`;

  const fbText = m.fb.caption;
  const fbHtml = `
    <div class="tab-content" id="tc-${idx}-fb">
      <div class="post-box">
        <div class="platform-label fb-label">👥 Facebook Post</div>
        <div class="post-text" id="fb-text-${idx}">${fbText.replace(/</g,'&lt;')}</div>
        <div class="visual-hint">Visual: ${m.fb.visual}</div>
        <button class="copy-btn" onclick="copyById('fb-text-${idx}',this)">⧉ Copy Post</button>
      </div>
    </div>`;

  const emailFull = `Subject: ${m.email.subject}\n\n${m.email.body}`;
  const emailHtml = `
    <div class="tab-content" id="tc-${idx}-email">
      <div class="post-box">
        <div class="platform-label em-label">✉️ Email — Copy Subject + Full Body</div>
        <div class="email-subject">Subject: ${m.email.subject}</div>
        <div class="post-text" id="email-text-${idx}">${m.email.body.replace(/</g,'&lt;')}</div>
        <button class="copy-btn" onclick="copyFull(${idx},this)">⧉ Copy Full Email</button>
      </div>
    </div>`;

  const blogHtml = `
    <div class="tab-content" id="tc-${idx}-blog">
      <div class="post-box">
        <div class="platform-label bl-label">📝 Blog Post Brief</div>
        <div class="blog-title">${m.blog.title}</div>
        <div class="blog-outline">${m.blog.outline}</div>
        <button class="copy-btn" onclick="copyBlog(${idx},this)">⧉ Copy Blog Brief</button>
      </div>
    </div>`;

  return `
    <div class="month-card">
      <div class="month-header">
        <div class="month-badge" style="background:${m.bg}">${m.icon}</div>
        <div>
          <div class="month-title">${m.name}</div>
          <div class="month-theme">${m.theme}</div>
        </div>
      </div>
      <div class="section">
        <div class="tabs">${tabsHtml}</div>
        ${eventHtml}${igHtml}${fbHtml}${emailHtml}${blogHtml}
      </div>
    </div>`;
}

function switchTab(monthIdx, tabIdx, key) {
  const keys = ['event','ig','fb','email','blog'];
  keys.forEach(k => {
    const el = document.getElementById(`tc-${monthIdx}-${k}`);
    if(el) el.classList.toggle('active', k === key);
  });
  const card = document.getElementById('monthContent').querySelector('.month-card');
  if(card) card.querySelectorAll('.tab').forEach((btn,i) => btn.classList.toggle('active', i === tabIdx));
}

function copyById(id, btn) {
  const el = document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function copyFull(idx, btn) {
  const subj = document.getElementById(`monthContent`).querySelector('.email-subject');
  const body = document.getElementById(`email-text-${idx}`);
  if(!subj || !body) return;
  const full = subj.innerText + '\n\n' + body.innerText;
  navigator.clipboard.writeText(full).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

function copyBlog(idx, btn) {
  const card = document.getElementById('monthContent').querySelector('.month-card');
  const title = card.querySelector('.blog-title');
  const outline = card.querySelector('.blog-outline');
  if(!title || !outline) return;
  const full = 'Blog Title: ' + title.innerText + '\n\nOutline:\n' + outline.innerText;
  navigator.clipboard.writeText(full).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
  });
}

const nav = document.getElementById('monthNav');
months.forEach((m, i) => {
  const btn = document.createElement('button');
  btn.className = 'nav-btn' + (i===0?' active':'');
  btn.textContent = m.icon + ' ' + m.name;
  btn.onclick = () => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('monthContent').innerHTML = renderMonth(i);
  };
  nav.appendChild(btn);
});

document.getElementById('monthContent').innerHTML = renderMonth(0);
</script>
